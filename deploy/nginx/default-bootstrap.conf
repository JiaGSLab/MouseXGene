# HTTP-only bootstrap for first Let's Encrypt issuance (no TLS files required).
# On the server: cp deploy/nginx/default-bootstrap.conf deploy/nginx/default.conf
# Then: docker compose ... up -d nginx
# After certbot succeeds, restore deploy/nginx/default.conf from git (HTTPS version) — see deploy/README.md.

upstream django_app {
    server web:8000;
}

server {
    listen 80;
    server_name jialabmouse.top www.jialabmouse.top;

    client_max_body_size 50M;
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location /static/ {
        alias /app/staticfiles/;
    }

    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
