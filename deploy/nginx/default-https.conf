# HTTPS 示例：配合 docker-compose 将 deploy/ssl 挂载到 /etc/nginx/ssl
# 解压 jialabmouse.top_nginx.zip 后，把 bundle.crt 与 .key 放到 deploy/ssl/，并按实际文件名修改下方两行路径。
# 腾讯云 Nginx 包内通常为：域名_bundle.crt、域名.key（或 bundle.pem + key）

upstream django_upstream {
    server web:8000;
}

server {
    listen 80;
    server_name jialabmouse.top www.jialabmouse.top;
    client_max_body_size 50M;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name jialabmouse.top www.jialabmouse.top;

    client_max_body_size 50M;
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    ssl_certificate /etc/nginx/ssl/jialabmouse.top_bundle.crt;
    ssl_certificate_key /etc/nginx/ssl/jialabmouse.top.key;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
    ssl_prefer_server_ciphers on;

    location /static/ {
        alias /app/staticfiles/;
    }

    location / {
        proxy_pass http://django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
