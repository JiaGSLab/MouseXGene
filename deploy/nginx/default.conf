# Production HTTPS + Let's Encrypt (certs on host at /etc/letsencrypt, mounted read-only).
# Before certificates exist, temporarily replace this file with default-bootstrap.conf — see deploy/README.md.

upstream django_app {
    server web:8000;
}

server {
    listen 80;
    server_name jialabmouse.top www.jialabmouse.top;

    client_max_body_size 50M;
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name jialabmouse.top www.jialabmouse.top;

    client_max_body_size 50M;
    access_log /dev/stdout;
    error_log /dev/stderr warn;

    ssl_certificate /etc/letsencrypt/live/jialabmouse.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jialabmouse.top/privkey.pem;
    ssl_session_timeout 5m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE:ECDH:AES:HIGH:!NULL:!aNULL:!MD5:!ADH:!RC4;
    ssl_prefer_server_ciphers on;

    location /static/ {
        alias /app/staticfiles/;
    }

    location / {
        proxy_pass http://django_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
