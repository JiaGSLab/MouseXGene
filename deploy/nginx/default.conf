limit_req_zone $binary_remote_addr zone=mousexgene_login:10m rate=6r/m;

upstream mousexgene_web {
    server web:8000;
    keepalive 16;
}

server {
    listen 80;
    server_name jialabmouse.top www.jialabmouse.top;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name jialabmouse.top www.jialabmouse.top;
    client_max_body_size 12M;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    ssl_certificate /etc/letsencrypt/live/jialabmouse.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jialabmouse.top/privkey.pem;

    location /static/ {
        alias /app/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /accounts/login/ {
        limit_req zone=mousexgene_login burst=4 nodelay;
        proxy_pass http://mousexgene_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        add_header Cache-Control "no-store" always;
    }

    location / {
        proxy_pass http://mousexgene_web;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}
