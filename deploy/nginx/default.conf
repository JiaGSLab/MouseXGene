upstream mousexgene_web {
    server web:8000;
}

server {
    listen 80;
    server_name jialabmouse.top www.jialabmouse.top;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name jialabmouse.top www.jialabmouse.top;

    ssl_certificate /etc/letsencrypt/live/jialabmouse.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/jialabmouse.top/privkey.pem;

    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        proxy_pass http://mousexgene_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }
}