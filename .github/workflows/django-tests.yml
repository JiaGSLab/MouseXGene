name: Django tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: mousexgene
          POSTGRES_USER: mousexgene
          POSTGRES_PASSWORD: ci-test-password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mousexgene -d mousexgene"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost"
      DJANGO_SECRET_KEY: "ci-insecure-test-key"
      POSTGRES_DB: "mousexgene"
      POSTGRES_USER: "mousexgene"
      POSTGRES_PASSWORD: "ci-test-password"
      POSTGRES_HOST: "localhost"
      POSTGRES_PORT: "5432"
      DB_HOST: "localhost"
      DB_PORT: "5432"
      TEST_DATABASE_ENGINE: "postgres"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Audit Python dependencies
        run: python -m pip install pip-audit && pip-audit -r requirements.txt

      - name: Run Django system checks
        run: python manage.py check

      - name: Check migrations are current
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: python manage.py test
