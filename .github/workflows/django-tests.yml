name: Django tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost"
      DJANGO_SECRET_KEY: "ci-insecure-test-key"
      POSTGRES_DB: "mousexgene"
      POSTGRES_USER: "mousexgene"
      POSTGRES_PASSWORD: "ci-not-used"
      POSTGRES_HOST: "localhost"
      POSTGRES_PORT: "5432"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libpq-dev \
            libcairo2 \
            libpango-1.0-0 \
            libpangocairo-1.0-0 \
            libgdk-pixbuf-2.0-0 \
            libffi-dev \
            shared-mime-info

      - name: Install Python dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run Django system checks
        run: python manage.py check

      - name: Run tests
        run: python manage.py test
