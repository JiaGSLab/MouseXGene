<select name="owner" class="filter-control" aria-label="Project owner">
    <option value="all" {% if not owner %}selected{% endif %}>All Owners</option>
    {% for item in owner_options %}
        <option value="{{ item.pk }}" {% if owner == item.pk|stringformat:"s" %}selected{% endif %}>{{ item.label }}</option>
    {% endfor %}
</select>
