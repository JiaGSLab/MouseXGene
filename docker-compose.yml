services:
  db:
    image: postgres:16
    container_name: mousexgene_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mousexgene
      POSTGRES_USER: mousexgene
      POSTGRES_PASSWORD: mousexgene_dev_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: mousexgene_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: dev-secret-key
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1

      POSTGRES_DB: mousexgene
      POSTGRES_USER: mousexgene
      POSTGRES_PASSWORD: mousexgene_dev_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    depends_on:
      - db

volumes:
  postgres_data: