services:
  db:
    image: postgres:16
    container_name: mousexgene_db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TZ: ${DJANGO_TIME_ZONE:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"

  web:
    build: .
    container_name: mousexgene_web
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - .env
    environment:
      TZ: ${DJANGO_TIME_ZONE:-Asia/Shanghai}
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      - db

volumes:
  postgres_data:
