services:
  db:
    image: postgres:16
    container_name: mousexgene_db_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      TZ: ${DJANGO_TIME_ZONE:-Asia/Shanghai}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  web:
    build: .
    container_name: mousexgene_web_prod
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60 --access-logfile - --error-logfile - --log-level info
    env_file:
      - .env.prod
    environment:
      TZ: ${DJANGO_TIME_ZONE:-Asia/Shanghai}
    expose:
      - "8000"
    volumes:
      # Mount project root so rsync/git pull on the host updates live code (restart web after sync).
      - .:/app
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    container_name: mousexgene_nginx_prod
    restart: unless-stopped
    environment:
      TZ: ${DJANGO_TIME_ZONE:-Asia/Shanghai}
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./acme-challenge:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_data_prod:
