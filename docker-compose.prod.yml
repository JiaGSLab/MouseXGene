services:
  db:
    image: postgres:16
    container_name: mousexgene_db_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  web:
    build: .
    container_name: mousexgene_web_prod
    restart: unless-stopped
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60
    env_file:
      - .env.prod
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  postgres_data_prod:
