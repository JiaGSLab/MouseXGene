services:
  db:
    image: postgres:16
    container_name: mousexgene_db_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      TZ: ${DJANGO_TIME_ZONE:-Asia/Shanghai}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  web:
    build: .
    container_name: mousexgene_web_prod
    restart: unless-stopped
    command: >
      sh -c "gunicorn config.wsgi:application --bind 0.0.0.0:8000
      --workers $${WEB_CONCURRENCY:-2}
      --worker-class gthread
      --threads $${GUNICORN_THREADS:-2}
      --timeout $${GUNICORN_TIMEOUT:-120}
      --access-logfile -
      --error-logfile -
      --log-level info"
    env_file:
      - .env.prod
    environment:
      TZ: ${DJANGO_TIME_ZONE:-Asia/Shanghai}
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; request = urllib.request.Request('http://127.0.0.1:8000/health/', headers={'Host': 'jialabmouse.top'}); urllib.request.urlopen(request, timeout=5)"]
      interval: 30s
      timeout: 6s
      retries: 3
      start_period: 20s
    volumes:
      # Mount project root so rsync/git pull on the host updates live code (restart web after sync).
      - .:/app
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - db

  nginx:
    image: nginx:1.27-alpine
    container_name: mousexgene_nginx_prod
    restart: unless-stopped
    environment:
      TZ: ${DJANGO_TIME_ZONE:-Asia/Shanghai}
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./staticfiles:/app/staticfiles:ro
      - ./acme-challenge:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro

volumes:
  postgres_data_prod:
